     class="box-title-green"
     id="text76">Rejestr stanu</text>
  <text
     x="931"
     y="371"
     text-anchor="middle"
     class="box-title-green"
     id="text78"
     style="font-size:17.3333px">SZDC</text>
  <text
     x="846"
     y="405"
     class="small"
     id="text80">• polityki i role</text>
  <text
     x="846"
     y="428"
     class="small"
     id="text82">• zasoby i kompetencje</text>
  <text
     x="846"
     y="451"
     class="small"
     id="text84">• przeglądy kierownictwa</text>
  <text
     x="846"
     y="474"
     class="small"
     id="text86">• doskonalenie systemu</text>
