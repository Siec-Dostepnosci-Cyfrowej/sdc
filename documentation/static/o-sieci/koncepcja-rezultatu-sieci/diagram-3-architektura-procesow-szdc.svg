  <text
     x="669"
     y="371"
     text-anchor="middle"
     class="box-title-green"
     id="text64"
     style="font-size:17.3333px">dostępności i zgodności</text>
  <text
     x="584"
     y="405"
     class="small"
     id="text66">• stan zasobów cyfrowych</text>
  <text
     x="584"
     y="428"
     class="small"
     id="text68">• problemy i dowody</text>
  <text
     x="584"
     y="451"
     class="small"
     id="text70">• działania naprawcze</text>
  <text
     x="584"
     y="474"
     class="small"
     id="text72">• podstawa deklaracji</text>
  <rect
     x="821"
     y="315"
     width="220"
     height="170"
     class="panel"
     id="rect74" />
  <text
     x="931"
     y="346"
