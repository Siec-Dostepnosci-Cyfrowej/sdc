     id="text22">DIAGRAM 3. ARCHITEKTURA PROCESÓW SZDC</text>
  <text
     x="800"
     y="88"
     text-anchor="middle"
     class="subtitle"
     id="text24">Jak procesy pozyskują, wykorzystują i udostępniają informacje w SZDC</text>
  <rect
     x="160"
     y="118"
     width="1280"
     height="72"
     rx="16"
     fill="#eef5ff"
     stroke="#2b63b7"
     stroke-width="2"
