     id="text148">CYKL INFORMACJI W SZDC</text>
  <text
     x="800"
     y="930"
     text-anchor="middle"
     class="text"
     id="text150">Pozyskanie → weryfikacja → aktualizacja rejestru → wykorzystanie do decyzji → udostępnienie → ponowna aktualizacja po zmianie stanu</text>
