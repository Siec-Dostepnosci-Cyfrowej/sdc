     y="282"
     text-anchor="middle"
     class="section-title"
     id="text36"
     style="font-size:19px">1. PROCESY POZYSKIWANIA INFORMACJI</text>
  <text
     x="105"
     y="330"
     class="box-title"
     id="text38">Funkcja</text>
  <text
     x="105"
     y="356"
     class="text"
     id="text40">Pozyskują nowe informacje i aktualizują rejestry.</text>
  <text
     x="105"
     y="398"
     class="box-title"
     id="text42">Przykłady</text>
  <text
     x="125"
     y="426"
     class="text"
     id="text44">• ocena stanu dostępności i zgodności</text>
  <text
     x="125"
     y="452"
     class="text"
     id="text46">• odbiór dostępnościowy</text>
  <text
     x="125"
     y="478"
     class="text"
     id="text48">• monitorowanie</text>
  <text
     x="125"
     y="504"
     class="text"
     id="text50">• zgłoszenia użytkowników i interesariuszy</text>
  <text
     x="125"
     y="530"
     class="text"
     id="text52">• przeglądy kierownictwa i ocena dojrzałości</text>
  <rect
     x="545.01575"
     y="235.01575"
     width="509.96851"
