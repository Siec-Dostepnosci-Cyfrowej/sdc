     text-anchor="middle"
     class="label"
     id="text28">GŁÓWNA ZASADA</text>
  <text
     x="800"
     y="174"
     text-anchor="middle"
     class="text"
     id="text30">Procesy SZDC nie utrzymują własnych zbiorów informacji. Korzystają z centralnych rejestrów i aktualizują je.</text>
  <rect
     x="70.044815"
