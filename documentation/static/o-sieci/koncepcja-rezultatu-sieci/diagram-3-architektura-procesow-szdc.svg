  <title
     id="title">Diagram 3. Architektura procesów SZDC</title>
  <desc
     id="desc">Diagram pokazuje trzy klasy procesów Systemu Zarządzania Dostępnością Cyfrową: procesy pozyskiwania informacji, procesy wykorzystania informacji oraz procesy udostępniania informacji. Procesy zasilają i wykorzystują dwa centralne rejestry informacji.</desc>
