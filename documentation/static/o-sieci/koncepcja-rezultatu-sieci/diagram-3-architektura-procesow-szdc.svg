  <text
     x="1325"
     y="282"
     text-anchor="middle"
     class="section-title"
     id="text94"
     style="font-size:19px">3. PROCESY UDOSTĘPNIANIA INFORMACJI</text>
  <text
     x="1155"
     y="330"
     class="box-title"
     id="text96">Funkcja</text>
  <text
     x="1155"
     y="356"
     class="text"
     id="text98">Prezentują informacje odpowiednim odbiorcom.</text>
  <text
     x="1155"
     y="398"
     class="box-title"
     id="text100">Przykłady</text>
  <text
     x="1175"
     y="426"
     class="text"
     id="text102">• deklaracja dostępności</text>
  <text
     x="1175"
     y="452"
     class="text"
     id="text104">• raportowanie kierownictwu</text>
  <text
     x="1175"
     y="478"
     class="text"
     id="text106">• informowanie użytkowników</text>
  <text
     x="1175"
     y="504"
     class="text"
     id="text108">• przekazywanie informacji wykonawcom</text>
  <text
     x="1175"
     y="530"
     class="text"
     id="text110">• raportowanie podmiotom uprawnionym</text>
  <rect
     x="365"
     y="625"
     width="870"
     height="220"
