     id="rect114" />
  <text
     x="800"
     y="657"
     text-anchor="middle"
     class="section-title"
     id="text116"
     style="font-size:19px">2. PROCESY WYKORZYSTANIA INFORMACJI</text>
  <text
     x="410"
     y="708"
     class="box-title-orange"
     id="text118">Funkcja</text>
  <text
     x="410"
     y="734"
     class="text"
     id="text120">Korzystają z informacji z rejestrów, aby podejmować decyzje i realizować działania.</text>
  <text
     x="410"
     y="776"
     class="box-title-orange"
     id="text122">Przykłady</text>
  <text
     x="412"
     y="804"
     class="text"
     id="text124">• planowanie działań i zasobów</text>
  <text
     x="412"
     y="830"
     class="text"
     id="text126">• usuwanie problemów dostępności</text>
  <text
     x="712"
     y="804"
     class="text"
     id="text128">• rozwój kompetencji</text>
  <text
     x="712"
     y="830"
     class="text"
     id="text130">• zakupy i odbiory</text>
  <text
     x="952"
     y="804"
     class="text"
     id="text132">• projektowanie, rozwój i utrzymanie</text>
  <text
     x="972"
     y="830"
     class="text"
     id="text134">rozwiązań wykorzystujących TIK</text>
