name: Deploy main site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'documentation/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
 
env:
  MERMAID_OUTPUT_DIR: documentation/static/img/diagrams
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    outputs:
      diagrams_changed: ${{ steps.diagrams_check.outputs.changed }}
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
 
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: documentation/package-lock.json
 
      - name: Install dependencies
        run: npm ci
        working-directory: documentation
 
      - name: Build Docusaurus site
        run: npm run build --if-present
        working-directory: documentation
 
      - name: Check if diagrams changed
        id: diagrams_check
        run: |
          if [ -n "$(git status --porcelain ${{ env.MERMAID_OUTPUT_DIR }})" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
 
      - name: Upload diagrams for commit
        if: steps.diagrams_check.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mermaid-diagrams
          path: ${{ env.MERMAID_OUTPUT_DIR }}
 
      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: documentation/build

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
 
    concurrency:
      group: pages-main
      cancel-in-progress: true
 
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
 
    if: github.ref == 'refs/heads/main' && needs.build.result == 'success'
 
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

  commit-diagrams:
    name: Commit pre-rendered diagrams
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: needs.build.outputs.diagrams_changed == 'true' && needs.deploy.result == 'success'
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
 
      - name: Download pre-rendered diagrams
        uses: actions/download-artifact@v4
        with:
          name: mermaid-diagrams
          path: ${{ env.MERMAID_OUTPUT_DIR }}
 
      - name: Commit pre-rendered diagrams
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: pre-render Mermaid diagrams [skip ci]"
          file_pattern: ${{ env.MERMAID_OUTPUT_DIR }}/**
 